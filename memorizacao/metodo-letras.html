<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatilho Mental | Mergulho Bíblico</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Merriweather:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fdfbf7;
            --navy-blue: #0a2342;
            --turquoise: #1cb3a0;
            --text-dark: #2c3e50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-dark); }

        header {
            background-color: var(--navy-blue);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { color: #fff; font-size: 1.1rem; font-family: 'Merriweather', serif; text-decoration: none; display: flex; align-items: center; gap: 10px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 5%; }

        #deck-menu h2 { font-family: 'Merriweather', serif; color: var(--navy-blue); margin-bottom: 30px; text-align: center; }
        
        /* GRADE DE 4 CARDS */
        .decks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .deck-card {
            background: white; padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center;
            cursor: pointer; transition: 0.3s; border: 2px solid transparent;
            display: flex; flex-direction: column; align-items: center;
            height: 100%;
        }

        .deck-card:hover { transform: translateY(-8px); border-color: var(--turquoise); }
        .deck-card i { font-size: 2.2rem; color: var(--turquoise); margin-bottom: 15px; }
        .deck-card h3 { color: var(--navy-blue); margin-bottom: 8px; font-size: 1.1rem; }
        .deck-card p { font-size: 0.75rem; color: #666; line-height: 1.4; }

        #practice-area { display: none; animation: fadeIn 0.5s ease; text-align: center; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-back {
            background: none; border: none; color: var(--navy-blue);
            font-weight: 600; cursor: pointer; margin-bottom: 30px;
            display: flex; align-items: center; gap: 8px;
        }

        .verse-box {
            background: white; padding: 60px 40px; border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08); margin-bottom: 30px;
            position: relative; border: 1px solid #eee;
        }

        #display-text {
            font-size: 2.2rem; letter-spacing: 6px; line-height: 1.6;
            color: var(--navy-blue); font-weight: 600; transition: 0.2s;
            word-wrap: break-word;
        }

        .hint-active {
            color: #999 !important; letter-spacing: 1px !important;
            font-size: 1.5rem !important; font-weight: 400 !important;
        }

        .action-btns { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }

        .btn-action {
            border: none; padding: 15px 35px; border-radius: 50px;
            font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 10px;
        }

        .btn-hint { background: #eee; color: #555; }
        .btn-next { background: var(--navy-blue); color: white; }
        .btn-next:hover { background: var(--turquoise); transform: scale(1.05); }

        .instructions { margin-top: 40px; font-size: 0.85rem; color: #999; max-width: 500px; margin-inline: auto; }
header {
            background-color: var(--navy-blue);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        header .logo { 
            color: #fff; 
            font-size: 1.2rem; 
            font-family: 'Merriweather', serif; 
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header nav ul { display: flex; list-style: none; gap: 20px; }
        header nav ul li a { color: #fff; text-decoration: none; font-size: 0.9rem; transition: 0.3s; opacity: 0.8; }
        header nav ul li a:hover { opacity: 1; color: var(--turquoise); }

        .btn-header { 
            background: var(--turquoise); 
            color: white; 
            padding: 10px 22px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-size: 0.85rem; 
            font-weight: 600;
            transition: 0.3s;
        }
        
        .btn-header:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(28, 179, 160, 0.3); }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 5%; }

    </style>
</head>

        let currentDeck = [];
        let currentIndex = 0;
        let originalText = "";
        let initialsText = "";

        function renderMenu() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            Object.keys(themeSettings).forEach(key => {
                const config = themeSettings[key];
                grid.innerHTML += `
                    <div class="deck-card" onclick="startLetters('${key}')">
                        <i class="fa-solid ${config.icon}"></i>
                        <h3>${config.title}</h3>
                        <p>${config.desc}</p>
                    </div>
                `;
            });
        }

        function startLetters(deckKey) {
            currentDeck = database[deckKey] || [];
            if(currentDeck.length === 0) { alert("Em breve!"); return; }
            currentIndex = 0;
            document.getElementById('deck-menu').style.display = 'none';
            document.getElementById('practice-area').style.display = 'block';
            loadVerse();
        }

        function loadVerse() {
            const v = currentDeck[currentIndex];
            document.getElementById('verse-ref').innerText = v.ref;
            originalText = v.text;
            
            // Lógica para gerar as iniciais mantendo pontuação colada à letra
            initialsText = v.text.split(' ').map(word => {
                if(word.length === 0) return "";
                const firstChar = word[0].toUpperCase();
                // Verifica se o último caractere da "palavra" é pontuação (.,!?)
                const lastChar = word[word.length - 1];
                const hasPunctuation = /[.,!?;:]/.test(lastChar);
                return hasPunctuation && word.length > 1 ? firstChar + lastChar : firstChar;
            }).join(' ');

            document.getElementById('display-text').innerText = initialsText;
            document.getElementById('display-text').classList.remove('hint-active');
        }

        function showFullText() {
            const display = document.getElementById('display-text');
            display.innerText = originalText;
            display.classList.add('hint-active');
        }

        function hideFullText() {
            const display = document.getElementById('display-text');
            display.innerText = initialsText;
            display.classList.remove('hint-active');
        }

        function nextVerse() {
            currentIndex = (currentIndex + 1) % currentDeck.length;
            loadVerse();
            window.scrollTo(0,0);
        }

        function backToMenu() {
            document.getElementById('deck-menu').style.display = 'block';
            document.getElementById('practice-area').style.display = 'none';
        }

        window.onload = renderMenu;
    </script>
